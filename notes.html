<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习笔记 · MyMind</title>
<style>
  :root {
    --red: #c41e3a;
    --red-dark: #b71c1c;
    --bg: #f5f5f5;
    --border: #e0e0e0;
    --text: #212121;
    --text-secondary: #666666;
  }
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header — same as index.html */
  .header {
    background: linear-gradient(135deg, var(--red-dark), var(--red));
    color: #fff;
    padding: 20px 24px 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header p {
    margin-top: 4px;
    font-size: 0.85rem;
    opacity: 0.85;
  }

  /* Top bar (sticky) */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* Nav */
  .nav {
    background: #fff;
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 32px;
  }
  .nav a, .nav-placeholder {
    padding: 14px 0;
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 0.95rem;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav a:hover, .nav a.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }
  .nav-placeholder {
    opacity: 0.55;
    cursor: default;
  }

  /* Notes layout */
  .notes-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #999;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-secondary);
    border-left: 3px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .sidebar-item:hover {
    background: #f9f9f9;
    color: var(--text);
  }
  .sidebar-item.active {
    background: #fef7f7;
    color: var(--red);
    border-left-color: var(--red);
    font-weight: 500;
  }
  .sidebar-item .icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* Content area */
  .content {
    flex: 1;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    justify-content: center;
  }
  #notesFrame {
    width: 960px;
    max-width:100%;
    height:100%;
    border: none;
    background: #fff;
    flex-shrink: 0;
  }

  /* Welcome state */
  .welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: 0.95rem;
    text-align: center;
    padding: 40px;
  }
  .welcome .big-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  @media (max-width: 640px) {
    .sidebar { width: 200px; min-width: 200px; }
    .sidebar-item { padding: 8px 12px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<!-- Top bar (sticky) -->
<div class="top-bar">
<!-- Header -->
<div class="header">
  <h1>🧠 MyMind</h1>
  <p>个人知识库 · 持续积累，持续思考</p>
</div>
<!-- Nav -->
<div class="nav">
  <div class="nav-inner">
    <a href="index.html">首页</a>
    <a href="news-digest.html">每日资讯</a>
    <a href="notes.html" class="active">学习笔记</a>
    <span class="nav-placeholder">项目记录</span>
  </div>
</div>
</div>

<!-- Notes Layout: sidebar + iframe content -->
<div class="notes-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">学习笔记</div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-item active" data-src="cs-crash-course-study-guide.html?embed=1" onclick="switchNote(this)">
        <span class="icon">📚</span>
        <span>计算机科学速成班</span>
      </div>
      <div class="sidebar-item" data-src="claude-code-study-guide.html?embed=1" onclick="switchNote(this)">
        <span class="icon">🤖</span>
        <span>Claude Code 教程</span>
      </div>
    </div>
  </div>

  <!-- Content: iframe (loads selected note) -->
  <div class="content">
    <iframe id="notesFrame" src="cs-crash-course-study-guide.html?embed=1" title="学习笔记内容"></iframe>
  </div>

</div>

<script>
function switchNote(el) {
  // Update active state
  document.querySelectorAll('.sidebar-item').forEach(function(item) {
    item.classList.remove('active');
  });
  el.classList.add('active');

  // Update iframe src
  var frame = document.getElementById('notesFrame');
  frame.src = el.getAttribute('data-src');
}
</script>

</body>
</html>
